{% extends "base.html" %}

{% block title %}Add User{% endblock %}

{% block content %}
    <h2>Add New User</h2>

    <form method="POST" action="/add-user">
        <label>Name:</label><br>
        <input type="text" name="name"><br><br>

        <label>Email:</label><br>
        <input type="email" name="email"><br><br>

        <button type="submit">Add User</button>
    </form>
{% endblock %}
